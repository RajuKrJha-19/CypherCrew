{#
    The most recently created tasks.

    Extracted from the two admin dashboards, which were 89% identical.
#}
    <div class="table-card">
        <h2 class="card-title">Recent Tasks</h2>

        {% for task in stats.recent_tasks %}
        <div class="activity-row">
            <div>
                <a href="{{ url_for('tasks.task_detail', task_id=task.id) }}">
                    {{ task.title }}
                </a>
                <span>{{ task.client.client_name }} - {{ task.status }}</span>
            </div>

            <span class="priority-dot {{ task.priority|lower }}">{{ task.priority }}</span>
        </div>
        {% else %}
        <p>No tasks yet.</p>
        {% endfor %}
    </div>
