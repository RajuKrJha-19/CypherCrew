<!DOCTYPE html>
<html>

<head>
    <title>Manage #{{ task.task_code }} | CypherCrew</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="layout">

{% include "partials/sidebar.html" %}

<main class="main">

    <div class="page-header">
        <div>
            <h1>Manage Task</h1>
            <p>#{{ task.task_code }} - {{ task.title }}</p>
        </div>

        <div class="top-actions">
            {% include "partials/notification_widget.html" %}
            <a href="{{ url_for('tasks.task_detail', task_id=task.id) }}" class="btn">
                Back
            </a>
        </div>
    </div>

    <div class="form-card add-task-card">

        <form method="POST">

            <label>Task ID</label>
            <input type="text" value="#{{ task.task_code }}" readonly>

            <label>Task Title</label>
            <input type="text" name="title" value="{{ task.title }}" required>

            <label>Description</label>
            <textarea name="description" rows="5">{{ task.description or "" }}</textarea>

            <label>Client</label>
            <select name="client_id" id="clientSelect" required>
                <option value="">Select Client</option>
                {% for client in clients %}
                    <option value="{{ client.id }}" {% if task.client_id == client.id %}selected{% endif %}>
                        {{ client.client_name }}
                    </option>
                {% endfor %}
            </select>

            <label>Deliverable</label>
            <select name="deliverable_id" id="deliverableSelect" required>
                <option value="">Select Deliverable</option>

                {% for item in deliverables %}
                    <option
                        value="{{ item.id }}"
                        data-client-id="{{ item.monthly_target.client_id }}"
                        {% if task.deliverable_id == item.id %}selected{% endif %}
                    >
                        {{ item.monthly_target.client.client_name }}
                        - {{ item.service_name }}
                        - {{ item.deliverable_name }}
                        - {{ item.monthly_target.month }}/{{ item.monthly_target.year }}
                    </option>
                {% endfor %}
            </select>

            <label>Assign To</label>
            <select name="assigned_to_id" required>
                <option value="">Select Employee</option>
                {% for employee in employees %}
                    <option value="{{ employee.id }}" {% if task.assigned_to_id == employee.id %}selected{% endif %}>
                        {{ employee.name }} - {{ employee.role|replace("_", " ")|title }}
                    </option>
                {% endfor %}
            </select>

            <div class="form-group">
                <label>Visibility</label>

                <div class="visibility-dropdown">
                    <div class="visibility-btn" id="visibilityBtn">
                        <span id="visibilityText">Select Employees</span>
                    </div>

                    <div class="visibility-menu" id="visibilityMenu">
                        {% for employee in employees %}
                            <label class="visibility-option">
                                <input
                                    type="checkbox"
                                    name="visibility_ids"
                                    value="{{ employee.id }}"
                                    data-name="{{ employee.name }} - {{ employee.role|replace('_', ' ')|title }}"
                                    {% if employee in task.visible_to %}checked{% endif %}
                                >
                                <span>
                                    {{ employee.name }} - {{ employee.role|replace("_", " ")|title }}
                                </span>
                            </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="selected-visibility" id="selectedVisibility"></div>
            </div>

            <div class="work-estimate-row">
                <div class="work-estimate-field">
                    <label>Quantity</label>
                    <input
                        type="number"
                        name="quantity"
                        min="0.1"
                        step="0.1"
                        value="{{ task.quantity or 1 }}"
                        required
                    >
                </div>

                <div class="work-estimate-field">
                    <label>Est. Time / Quantity (hrs)</label>
                    <input
                        type="number"
                        name="estimated_time"
                        min="0.1"
                        step="0.1"
                        value="{{ task.estimated_time or 1 }}"
                        required
                    >
                </div>
            </div>

            <label>Priority</label>
            <select name="priority">
                {% for priority in ["Low", "Medium", "High", "Urgent"] %}
                    <option value="{{ priority }}" {% if task.priority == priority %}selected{% endif %}>
                        {{ priority }}
                    </option>
                {% endfor %}
            </select>

            <label>Status</label>
            <select name="status">
                {% for status in ["Pending", "In Progress", "Hold", "Core Review", "Client Review", "Published"] %}
                    <option value="{{ status }}" {% if task.status == status %}selected{% endif %}>
                        {{ status }}
                    </option>
                {% endfor %}
            </select>

            <label>Deadline</label>
            <input
                type="datetime-local"
                name="deadline"
                value="{% if task.deadline %}{{ task.deadline.strftime('%Y-%m-%dT%H:%M') }}{% endif %}"
            >

            <button type="submit">
                Save Changes
            </button>

        </form>

    </div>

</main>

</div>

<script>
const clientSelect = document.getElementById("clientSelect");
const deliverableSelect = document.getElementById("deliverableSelect");

const allDeliverableOptions = Array.from(
    deliverableSelect.querySelectorAll("option")
);

const selectedDeliverableId = "{{ task.deliverable_id }}";

function filterDeliverablesByClient() {
    const selectedClientId = clientSelect.value;

    deliverableSelect.innerHTML = "";

    const defaultOption = document.createElement("option");
    defaultOption.value = "";
    defaultOption.textContent = "Select Deliverable";
    deliverableSelect.appendChild(defaultOption);

    allDeliverableOptions.forEach(function (option) {
        if (!option.value) return;

        if (option.dataset.clientId === selectedClientId) {
            const clonedOption = option.cloneNode(true);

            if (clonedOption.value === selectedDeliverableId) {
                clonedOption.selected = true;
            }

            deliverableSelect.appendChild(clonedOption);
        }
    });
}

clientSelect.addEventListener("change", filterDeliverablesByClient);
filterDeliverablesByClient();


const visibilityBtn = document.getElementById("visibilityBtn");
const visibilityMenu = document.getElementById("visibilityMenu");
const selectedVisibility = document.getElementById("selectedVisibility");
const visibilityText = document.getElementById("visibilityText");

visibilityBtn.addEventListener("click", function () {
    visibilityMenu.classList.toggle("show");
});

document.addEventListener("click", function (e) {
    if (!e.target.closest(".visibility-dropdown")) {
        visibilityMenu.classList.remove("show");
    }
});

function updateSelectedVisibility() {
    const checkedBoxes = document.querySelectorAll("input[name='visibility_ids']:checked");

    selectedVisibility.innerHTML = "";

    if (checkedBoxes.length === 0) {
        visibilityText.textContent = "Select Employees";
        return;
    }

    visibilityText.textContent = checkedBoxes.length + " employee selected";

    checkedBoxes.forEach(function (checkbox) {
        const chip = document.createElement("div");
        chip.className = "visibility-chip";

        chip.innerHTML = `
            <span>${checkbox.dataset.name}</span>
            <button type="button" data-id="${checkbox.value}">×</button>
        `;

        selectedVisibility.appendChild(chip);
    });
}

document.querySelectorAll("input[name='visibility_ids']").forEach(function (checkbox) {
    checkbox.addEventListener("change", updateSelectedVisibility);
});

selectedVisibility.addEventListener("click", function (e) {
    if (e.target.tagName === "BUTTON") {
        const id = e.target.getAttribute("data-id");

        const checkbox = document.querySelector(
            `input[name='visibility_ids'][value="${id}"]`
        );

        if (checkbox) {
            checkbox.checked = false;
        }

        updateSelectedVisibility();
    }
});

updateSelectedVisibility();
</script>

</body>

</html>
